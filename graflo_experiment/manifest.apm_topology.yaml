schema:
  metadata:
    name: apm_topology
    version: 0.1.0
    description: Experimental GraFlo manifest for APM infrastructure topology.
  db_profile: {}
  graph:
    vertex_config:
      vertices:
        - name: Cluster
          properties:
            - id
            - name
            - environment
            - region
            - owner_team
          identity:
            - id
        - name: Subcluster
          properties:
            - id
            - name
            - apm_cluster
            - role
            - zone
          identity:
            - id
        - name: Application
          properties:
            - id
            - name
            - apm_cluster
            - production_domain_manager
            - application_manager
            - domain_manager
            - production_manager
            - apm_spoc
            - criticality
            - business_owner
            - runtime_tier
          identity:
            - id
        - name: Contact
          properties:
            - id
            - name
            - refog
          identity:
            - id
        - name: ApplicationDap
          properties:
            - id
            - apm_application
            - dap_id
            - dap_name
            - direction
            - protocol
          identity:
            - id
        - name: Dap
          properties:
            - id
            - name
          identity:
            - id
        - name: Technology
          properties:
            - id
            - name
            - category
            - vendor
            - version
            - lifecycle
          identity:
            - id
        - name: ObsolescenceRecord
          properties:
            - id
            - application_id
            - technology_id
            - host
            - criticality
            - env
            - location_country
            - obsolescence_status
            - risk_level
            - detected_at
            - evidence
          identity:
            - id
        - name: Host
          properties:
            - id
            - name
          identity:
            - id
        - name: Criticality
          properties:
            - id
            - name
          identity:
            - id
        - name: Environment
          properties:
            - id
            - name
          identity:
            - id
        - name: LocationCountry
          properties:
            - id
            - name
          identity:
            - id
    edge_config:
      edges:
        - source: Cluster
          target: Subcluster
          relation: HAS_SUBCLUSTER
        - source: Cluster
          target: Application
          relation: HAS_APPLICATION
        - source: Application
          target: Contact
          relation: HAS_PRODUCTION_DOMAIN_MANAGER
        - source: Application
          target: Contact
          relation: HAS_APPLICATION_MANAGER
        - source: Application
          target: Contact
          relation: HAS_DOMAIN_MANAGER
        - source: Application
          target: Contact
          relation: HAS_PRODUCTION_MANAGER
        - source: Application
          target: Contact
          relation: HAS_APM_SPOC
        - source: Application
          target: ApplicationDap
          relation: HAS_DAP_BINDING
        - source: ApplicationDap
          target: Dap
          relation: TARGETS_DAP
        - source: Application
          target: Dap
          relation: EXPOSES_DAP
        - source: Application
          target: ObsolescenceRecord
          relation: HAS_OBSOLESCENCE_RECORD
        - source: ObsolescenceRecord
          target: Host
          relation: ON_HOST
        - source: ObsolescenceRecord
          target: Technology
          relation: REFERENCES_TECHNOLOGY
        - source: ObsolescenceRecord
          target: Criticality
          relation: HAS_CRITICALITY
        - source: ObsolescenceRecord
          target: Environment
          relation: IN_ENVIRONMENT
        - source: ObsolescenceRecord
          target: LocationCountry
          relation: LOCATED_IN
ingestion_model:
  resources:
    - name: apm_cluster
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: Cluster
    - name: apm_subclusters
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: Subcluster
        - vertex: Cluster
          from:
            id: apm_cluster
        - source: Cluster
          target: Subcluster
          relation: HAS_SUBCLUSTER
    - name: apm_applications
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: Application
        - vertex: Cluster
          from:
            id: apm_cluster
        - source: Cluster
          target: Application
          relation: HAS_APPLICATION
        - vertex: Contact
          from:
            id: production_domain_manager
        - source: Application
          target: Contact
          relation: HAS_PRODUCTION_DOMAIN_MANAGER
        - vertex: Contact
          from:
            id: application_manager
        - source: Application
          target: Contact
          relation: HAS_APPLICATION_MANAGER
        - vertex: Contact
          from:
            id: domain_manager
        - source: Application
          target: Contact
          relation: HAS_DOMAIN_MANAGER
        - vertex: Contact
          from:
            id: production_manager
        - source: Application
          target: Contact
          relation: HAS_PRODUCTION_MANAGER
        - vertex: Contact
          from:
            id: apm_spoc
        - source: Application
          target: Contact
          relation: HAS_APM_SPOC
    - name: apm_contacts
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: Contact
    - name: apm_application_daps
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: ApplicationDap
        - vertex: Application
          from:
            id: apm_application
        - source: Application
          target: ApplicationDap
          relation: HAS_DAP_BINDING
        - vertex: Dap
          from:
            id: dap_id
            name: dap_name
        - source: ApplicationDap
          target: Dap
          relation: TARGETS_DAP
        - source: Application
          target: Dap
          relation: EXPOSES_DAP
    - name: apm_obso
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: ObsolescenceRecord
        - vertex: Application
          from:
            id: application_id
        - source: Application
          target: ObsolescenceRecord
          relation: HAS_OBSOLESCENCE_RECORD
        - vertex: Host
          from:
            id: host
        - source: ObsolescenceRecord
          target: Host
          relation: ON_HOST
        - vertex: Technology
          from:
            id: technology_id
        - source: ObsolescenceRecord
          target: Technology
          relation: REFERENCES_TECHNOLOGY
        - vertex: Criticality
          from:
            id: criticality
        - source: ObsolescenceRecord
          target: Criticality
          relation: HAS_CRITICALITY
        - vertex: Environment
          from:
            id: env
        - source: ObsolescenceRecord
          target: Environment
          relation: IN_ENVIRONMENT
        - vertex: LocationCountry
          from:
            id: location_country
        - source: ObsolescenceRecord
          target: LocationCountry
          relation: LOCATED_IN
    - name: apm_technologies
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: Technology
