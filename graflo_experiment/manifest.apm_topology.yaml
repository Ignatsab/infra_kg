schema:
  metadata:
    name: "apm_topology"
    version: "0.1.0"
    description: "Experimental GraFlo manifest for APM infrastructure topology."
  db_profile: {}
  graph:
    vertex_config:
      vertices:
        - name: "Cluster"
          properties:
            - "id"
            - "name"
            - "environment"
            - "region"
            - "owner_team"
          identity:
            - "id"
        - name: "Subcluster"
          properties:
            - "id"
            - "name"
            - "apm_cluster"
            - "role"
            - "zone"
          identity:
            - "id"
        - name: "Application"
          properties:
            - "id"
            - "name"
            - "apm_cluster"
            - "production_domain_manager"
            - "application_manager"
            - "domain_manager"
            - "production_manager"
            - "apm_spoc"
            - "criticality"
            - "business_owner"
            - "runtime_tier"
          identity:
            - "id"
        - name: "Contact"
          properties:
            - "id"
            - "name"
            - "refog"
          identity:
            - "id"
        - name: "ApplicationDap"
          properties:
            - "id"
            - "apm_application"
            - "dap_id"
            - "dap_name"
            - "direction"
            - "protocol"
          identity:
            - "id"
        - name: "Dap"
          properties:
            - "id"
            - "name"
          identity:
            - "id"
        - name: "Technology"
          properties:
            - "id"
            - "name"
            - "category"
            - "vendor"
            - "version"
            - "lifecycle"
          identity:
            - "id"
        - name: "ObsolescenceRecord"
          properties:
            - "id"
            - "application_id"
            - "technology_id"
            - "host"
            - "criticality"
            - "env"
            - "location_country"
            - "obsolescence_status"
            - "risk_level"
            - "detected_at"
            - "evidence"
          identity:
            - "id"
        - name: "Host"
          properties:
            - "id"
            - "name"
          identity:
            - "id"
        - name: "Criticality"
          properties:
            - "id"
            - "name"
          identity:
            - "id"
        - name: "Environment"
          properties:
            - "id"
            - "name"
          identity:
            - "id"
        - name: "LocationCountry"
          properties:
            - "id"
            - "name"
          identity:
            - "id"
    edge_config:
      edges:
        - source: "Cluster"
          target: "Subcluster"
          relation: "HAS_SUBCLUSTER"
        - source: "Cluster"
          target: "Application"
          relation: "HAS_APPLICATION"
        - source: "Application"
          target: "Contact"
          relation: "HAS_PRODUCTION_DOMAIN_MANAGER"
        - source: "Application"
          target: "Contact"
          relation: "HAS_APPLICATION_MANAGER"
        - source: "Application"
          target: "Contact"
          relation: "HAS_DOMAIN_MANAGER"
        - source: "Application"
          target: "Contact"
          relation: "HAS_PRODUCTION_MANAGER"
        - source: "Application"
          target: "Contact"
          relation: "HAS_APM_SPOC"
        - source: "Application"
          target: "ApplicationDap"
          relation: "HAS_DAP_BINDING"
        - source: "ApplicationDap"
          target: "Dap"
          relation: "TARGETS_DAP"
        - source: "Application"
          target: "Dap"
          relation: "EXPOSES_DAP"
        - source: "Application"
          target: "ObsolescenceRecord"
          relation: "HAS_OBSOLESCENCE_RECORD"
        - source: "ObsolescenceRecord"
          target: "Host"
          relation: "ON_HOST"
        - source: "ObsolescenceRecord"
          target: "Technology"
          relation: "REFERENCES_TECHNOLOGY"
        - source: "ObsolescenceRecord"
          target: "Criticality"
          relation: "HAS_CRITICALITY"
        - source: "ObsolescenceRecord"
          target: "Environment"
          relation: "IN_ENVIRONMENT"
        - source: "ObsolescenceRecord"
          target: "LocationCountry"
          relation: "LOCATED_IN_COUNTRY"
ingestion_model:
  resources:
    - name: "apm_cluster__vertex__Cluster"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Cluster"
    - name: "apm_subclusters__vertex__Subcluster"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Subcluster"
    - name: "apm_applications__vertex__Application"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Application"
    - name: "apm_contacts__vertex__Contact"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Contact"
    - name: "apm_application_daps__vertex__ApplicationDap"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "ApplicationDap"
    - name: "apm_application_daps__vertex__Dap"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Dap"
          "from":
            id: "dap_id"
            name: "dap_name"
    - name: "apm_technologies__vertex__Technology"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Technology"
    - name: "apm_obso__vertex__ObsolescenceRecord"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "ObsolescenceRecord"
    - name: "apm_obso__vertex__Host"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Host"
          "from":
            id: "host"
            name: "host"
    - name: "apm_obso__vertex__Criticality"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Criticality"
          "from":
            id: "criticality"
            name: "criticality"
    - name: "apm_obso__vertex__Environment"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Environment"
          "from":
            id: "env"
            name: "env"
    - name: "apm_obso__vertex__LocationCountry"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "LocationCountry"
          "from":
            id: "location_country"
            name: "location_country"
    - name: "apm_subclusters__edge__HAS_SUBCLUSTER"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Cluster"
          "from":
            id: "apm_cluster"
        - vertex: "Subcluster"
          "from":
            id: "id"
        - source: "Cluster"
          target: "Subcluster"
          relation: "HAS_SUBCLUSTER"
    - name: "apm_applications__edge__HAS_APPLICATION"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Cluster"
          "from":
            id: "apm_cluster"
        - vertex: "Application"
          "from":
            id: "id"
        - source: "Cluster"
