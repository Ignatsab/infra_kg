<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infrastructure Topology Graph</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #16202a;
      --muted: #5d6975;
      --line: #d7dce2;
      --accent: #0f766e;
      --selected: #c2410c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .counts {
      display: flex;
      gap: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    input, select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }
    input { width: 260px; }
    button {
      cursor: pointer;
      background: #eef6f5;
      border-color: #b9d9d5;
      color: #0f5f58;
      font-weight: 600;
    }
    main {
      min-width: 0;
      min-height: 0;
      position: relative;
    }
    svg {
      width: 100%;
      height: calc(100vh - 59px);
      display: block;
      background: #fbfcfd;
    }
    aside {
      min-height: 0;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      min-width: 0;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .node circle {
      stroke: #fff;
      stroke-width: 2;
      cursor: pointer;
    }
    .node.selected circle {
      stroke: var(--selected);
      stroke-width: 4;
    }
    .node text {
      pointer-events: none;
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      fill: #16202a;
    }
    .edge {
      stroke: #8f9aa7;
      stroke-opacity: 0.58;
      stroke-width: 1.5;
      marker-end: url(#arrow);
    }
    .edge.highlight {
      stroke: var(--selected);
      stroke-opacity: 0.9;
      stroke-width: 2.5;
    }
    .details h2 {
      margin: 0 0 4px;
      font-size: 17px;
      letter-spacing: 0;
    }
    .details .sub {
      color: var(--muted);
      margin-bottom: 14px;
    }
    .property {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid #edf0f3;
    }
    .property b {
      color: var(--muted);
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .property span {
      overflow-wrap: anywhere;
    }
    .empty {
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(420px, 1fr) auto;
      }
      aside { border-left: 0; border-top: 1px solid var(--line); }
      header { align-items: stretch; flex-direction: column; }
      .controls { margin-left: 0; flex-wrap: wrap; }
      input { width: min(100%, 320px); }
      svg { height: 60vh; min-height: 420px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Infrastructure Topology Graph</h1>
      <div class="counts" id="counts"></div>
      <div class="controls">
        <input id="search" type="search" placeholder="Search id, name, host, technology">
        <select id="labelFilter"></select>
        <button id="reset">Reset</button>
      </div>
    </header>
    <main>
      <svg id="graph" role="img" aria-label="Topology graph"></svg>
    </main>
    <aside>
      <div class="legend" id="legend"></div>
      <section class="details" id="details">
        <h2>Select a node</h2>
        <div class="sub">Click any node to inspect all source properties.</div>
      </section>
    </aside>
  </div>

        edgeLayer.appendChild(line);
      }

      for (const node of nodes) {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", node.key === selectedKey ? "node selected" : "node");
        group.setAttribute("transform", `translate(${node.x},${node.y})`);
        group.addEventListener("click", () => {
          selectedKey = node.key;
          showDetails(node);
          layoutAndRender();
        });

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", nodeRadius(node.label));
        circle.setAttribute("fill", palette[node.label] || "#64748b");
        group.appendChild(circle);
        group.appendChild(svgTitle(`${node.label}\n${nodeName(node)}\n${node.key}`));

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", nodeRadius(node.label) + 6);
        text.setAttribute("y", 4);
        text.textContent = truncate(nodeName(node), 28);
        group.appendChild(text);
        nodeLayer.appendChild(group);
      }

      if (!nodes.length) {
        const empty = document.createElementNS("http://www.w3.org/2000/svg", "text");
        empty.setAttribute("x", width / 2);
        empty.setAttribute("y", height / 2);
        empty.setAttribute("text-anchor", "middle");
        empty.setAttribute("fill", "#5d6975");
        empty.textContent = "No nodes match the current filters";
        svg.appendChild(empty);
      }
    }

    function edgeTouchesSelection(edge) {
      return selectedKey && (edge.start_key === selectedKey || edge.end_key === selectedKey);
    }

    function nodeRadius(label) {
      if (label === "Application") return 13;
      if (label === "Cluster") return 15;
      if (label === "Host") return 11;
      return 10;
    }

    function svgTitle(text) {
      const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
      title.textContent = text;
      return title;
    }

    function showDetails(node) {
      const props = node.properties || {};
      const rows = Object.entries(props).sort(([a], [b]) => a.localeCompare(b)).map(([key, value]) => {
        const valueText = Array.isArray(value) ? value.join(", ") : String(value);
        return `<div class="property"><b>${escapeHtml(key)}</b><span>${escapeHtml(valueText)}</span></div>`;
      }).join("");
      const connected = graph.edges.filter(edge => edge.start_key === node.key || edge.end_key === node.key);
      const edgeRows = connected.slice(0, 24).map(edge => {
        const direction = edge.start_key === node.key ? "out" : "in";
        const otherKey = edge.start_key === node.key ? edge.end_key : edge.start_key;
        return `<div class="property"><b>${escapeHtml(direction)}</b><span>${escapeHtml(edge.type)} -> ${escapeHtml(otherKey)}</span></div>`;
      }).join("");
      detailsEl.innerHTML = `
        <h2>${escapeHtml(nodeName(node))}</h2>
        <div class="sub">${escapeHtml(node.label)} / ${escapeHtml(node.identity)}</div>
        <h3>Properties</h3>
        ${rows || '<div class="empty">No properties</div>'}
        <h3>Relationships</h3>
        ${edgeRows || '<div class="empty">No relationships</div>'}
      `;
    }

    function truncate(text, limit) {
      return text.length <= limit ? text : text.slice(0, limit - 1) + "...";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    searchEl.addEventListener("input", applyFilters);
    labelFilterEl.addEventListener("change", applyFilters);
    resetEl.addEventListener("click", () => {
      searchEl.value = "";
      labelFilterEl.value = "";
      selectedKey = null;
      detailsEl.innerHTML = '<h2>Select a node</h2><div class="sub">Click any node to inspect all source properties.</div>';
      applyFilters();
    });
    window.addEventListener("resize", () => layoutAndRender());

    applyFilters();
  </script>
</body>
</html>
