    - name: "apm_applications__edge__HAS_PRODUCTION_DOMAIN_MANAGER"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
        - vertex: "Application"
          "from":
            id: "id"
        - vertex: "Contact"
          "from":
