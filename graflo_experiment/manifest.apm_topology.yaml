        - source: "Application"
          target: "Contact"
          relation: "HAS_PRODUCTION_DOMAIN_MANAGER"
    - name: "apm_applications__edge__HAS_APPLICATION_MANAGER"
      drop_trivial_input_fields: true
      fail_fast: false
      pipeline:
